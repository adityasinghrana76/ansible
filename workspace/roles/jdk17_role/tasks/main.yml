---
- name: Create Java install directory
  file:
    path: "{{ java_install_dir }}"
    state: directory
    mode: '0755'

- name: Download JDK 17
  get_url:
    url: "{{ java_download_url }}"
    dest: /tmp/jdk17.tar.gz
    mode: '0644'

- name: Extract JDK 17
  unarchive:
    src: /tmp/jdk17.tar.gz
    dest: "{{ java_install_dir }}"
    remote_src: yes
    creates: "{{ java_home }}"

- name: Set JAVA_HOME
  copy:
    dest: /etc/profile.d/jdk17.sh
    content: |
      export JAVA_HOME={{ java_home }}
      export PATH=$JAVA_HOME/bin:$PATH
    mode: '0755'

- name: Configure update-alternatives for java
  alternatives:
    name: java
    path: "{{ java_home }}/bin/java"
    priority: "{{ java_priority }}"
  when: java_set_default

- name: Configure update-alternatives for javac
  alternatives:
    name: javac
    path: "{{ java_home }}/bin/javac"
    priority: "{{ java_priority }}"
  when: java_set_default
