- name: Create Java install directory
  file:
    path: "{{ java_install_dir }}"
    state: directory
    mode: "0755"

- name: Download JDK 17 tar.gz
  get_url:
    url: "{{ java_download_url }}"
    dest: "/tmp/{{ java_tar_name }}"
    mode: "0644"

- name: Extract JDK 17
  unarchive:
    src: "/tmp/{{ java_tar_name }}"
    dest: "{{ java_install_dir }}"
    remote_src: yes
  args:
    creates: "{{ java_home }}/bin/java"

- name: Set JAVA_HOME globally
  copy:
    dest: /etc/profile.d/java.sh
    content: |
      export JAVA_HOME={{ java_home }}
      export PATH=$JAVA_HOME/bin:$PATH
    mode: "0644"

- name: Configure update-alternatives for java
  community.general.alternatives:
    name: java
    link: /usr/bin/java
    path: "{{ java_home }}/bin/java"

- name: Configure update-alternatives for javac
  community.general.alternatives:
    name: javac
    link: /usr/bin/javac
    path: "{{ java_home }}/bin/javac"
